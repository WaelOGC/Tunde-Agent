# PostgreSQL 15 + FastAPI app.
#
# Secrets: keep TELEGRAM_TOKEN / MY_TELEGRAM_CHAT_ID / GEMINI_* in project ``.env`` (not committed).
# ``env_file`` loads them; explicit ``environment`` only for DB URLs that must point at service ``db``.

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tunde
      POSTGRES_PASSWORD: tunde
      POSTGRES_DB: tunde
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunde -d tunde"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Persists auto-saved Telegram operator chat id (see telegram_operator_chat.py).
      - ./data:/app/data
    environment:
      DATABASE_URL: postgresql://tunde_app:tunde_app_dev@db:5432/tunde
      ALEMBIC_DATABASE_URL: postgresql://tunde:tunde@db:5432/tunde
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      MY_TELEGRAM_CHAT_ID: ${MY_TELEGRAM_CHAT_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-gemini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
